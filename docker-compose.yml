services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: appis-gerador-relatorios-front
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3333}
    restart: unless-stopped
    networks:
      - appis-network

  # Para desenvolvimento com hot reload
  frontend-dev:
    image: node:20-alpine
    container_name: appis-gerador-relatorios-front-dev
    working_dir: /app
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3333}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
    networks:
      - appis-network
    profiles:
      - dev

networks:
  appis-network:
    driver: bridge
